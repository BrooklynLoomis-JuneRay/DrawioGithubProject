<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2 id="form-title">Login</h2>

        <!-- Login Form -->
        <form id="login-form">
            <div class="input-group">
                <input type="text" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button type="submit">Login</button>

            <p class="toggle-text">
                Don't have an account? 
                <span onclick="toggleForm()">Register</span>
            </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden">
            <div class="input-group">
                <input type="text" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button type="submit">Register</button>

            <p class="toggle-text">
                Already have an account? 
                <span onclick="toggleForm()">Login</span>
            </p>
        </form>

        <div id="status-message"></div>
    </div>
</div>

<script>
function toggleForm() {
    const login = document.getElementById("login-form");
    const register = document.getElementById("register-form");
    const title = document.getElementById("form-title");

    login.classList.toggle("hidden");
    register.classList.toggle("hidden");

    title.textContent = login.classList.contains("hidden") ? "Register" : "Login";
}
</script>

<!-- 🔥 FIREBASE SCRIPT (ALL IN ONE PLACE) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
    getFirestore, 
    doc, 
    setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = this.querySelector("input[type='text']").value;
    const password = this.querySelector("input[type='password']").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.href = "dashboard.html";
        })
        .catch(() => {
            showMessage("ACCESS DENIED", false);
        });
});

// REGISTER
document.getElementById("register-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const inputs = this.querySelectorAll("input");
    const username = inputs[0].value;
    const email = inputs[1].value;
    const password = inputs[2].value;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
            username: username,
            email: email
        });

        showMessage("USER CREATED", true);

    } catch (err) {
        showMessage(err.message, false);
    }
});

// UI MESSAGE
function showMessage(msg, success) {
    const el = document.getElementById("status-message");
    el.textContent = msg;
    el.style.color = success ? "#00ff99" : "#ff0033";
}
</script>

</body>
</html>
