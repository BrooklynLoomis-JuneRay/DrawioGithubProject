<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2 id="form-title">Login</h2>

        <!-- Login Form -->
        <form id="login-form">
            <div class="input-group">
                <input type="text" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button type="submit">Login</button>

            <p class="toggle-text">
                Don't have an account? 
                <span onclick="toggleForm()">Register</span>
            </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden">
            <div class="input-group">
                <input type="text" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button type="submit">Register</button>

            <p class="toggle-text">
                Already have an account? 
                <span onclick="toggleForm()">Login</span>
            </p>
        </form>
    </div>
</div>

<script>
function toggleForm() {
    const login = document.getElementById("login-form");
    const register = document.getElementById("register-form");
    const title = document.getElementById("form-title");

    login.classList.toggle("hidden");
    register.classList.toggle("hidden");

    title.textContent = login.classList.contains("hidden") ? "Register" : "Login";
}
</script>
    
<script>
let users = [];

// Load users from JSON + localStorage
async function loadUsers() {
    const response = await fetch('users.json');
    const data = await response.json();

    const localUsers = JSON.parse(localStorage.getItem("users")) || [];

    users = [...data, ...localUsers];
}

loadUsers();

// LOGIN
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = this.querySelector("input[type='text']").value;
    const password = this.querySelector("input[type='password']").value;

    const found = users.find(u => u.username === username && u.password === password);

    if (found) {
        alert("ACCESS GRANTED");
    } else {
        alert("ACCESS DENIED");
    }
});

// REGISTER
document.getElementById("register-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const inputs = this.querySelectorAll("input");
    const username = inputs[0].value;
    const email = inputs[1].value;
    const password = inputs[2].value;

    const exists = users.find(u => u.username === username);

    if (exists) {
        alert("USER ALREADY EXISTS");
        return;
    }

    const newUser = { username, password };

    // Save to localStorage (since we can't write to JSON)
    const localUsers = JSON.parse(localStorage.getItem("users")) || [];
    localUsers.push(newUser);
    localStorage.setItem("users", JSON.stringify(localUsers));

    alert("USER REGISTERED (LOCAL)");
    location.reload();
});
</script>
