<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="styles.css">

<style>
.dashboard-container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 200px;
    padding: 20px;
    border-right: 1px solid #00ff99;
}

.sidebar button {
    width: 100%;
    margin-bottom: 20px;
}

.main-content {
    flex: 1;
    padding: 20px;
}

.dashboard-header {
    margin-bottom: 20px;
    border-bottom: 1px solid #00ff99;
    padding-bottom: 10px;
}

.projects-section h3 {
    margin-bottom: 15px;
}

.project-card {
    border: 1px solid #00ff99;
    padding: 20px;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar">
        <button id="new-project-btn">+ New Project</button>
        <button id="logout-btn">Logout</button>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <h2 id="welcome-text">Loading...</h2>
        </div>
        
        <h3>Previous Projects</h3>
        <div class="project-card">
            No previous projects. Start your first one?
        </div>
    </div>

</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

console.log("Script loaded");

// 🔑 WAIT FOR AUTH
onAuthStateChanged(auth, (user) => {
    console.log("Auth state:", user);

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    // Show user
    document.getElementById("welcome-text").textContent =
        "WELCOME, " + user.uid;

    // ✅ NOW attach button handlers (AFTER user exists)

    document.getElementById("new-project-btn").addEventListener("click", async () => {
        console.log("New project clicked");

        const docRef = await addDoc(collection(db, "projects"), {
            name: "New Project",
            owner: user.username,
            collaborators: [user.uid],
            createdAt: new Date()
        });

        window.location.href = `project.html?id=${docRef.id}`;
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
        console.log("Logout clicked");

        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });

});
</script>

</body>
</html>
