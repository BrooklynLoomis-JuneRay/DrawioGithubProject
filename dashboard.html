<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar">
        <button id="new-project-btn">+ New Project</button>
        <button id="logout-btn">Logout</button>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <h2 id="welcome-text">Loading...</h2>
        </div>
        
        <div class="projects-section">
            <h3>My Projects</h3>
            <div id="my-projects-list">
                <div class="project-card">Loading projects...</div>
            </div>
        </div>

        <div class="projects-section">
            <h3>Shared with Me</h3>
            <div id="shared-projects-list">
                <div class="project-card">Loading shared projects...</div>
            </div>
        </div>
    </div>

</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    query, 
    where, 
    onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔑 WAIT FOR AUTH
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById("welcome-text").textContent = "WELCOME, " + user.email;

    // Load My Projects
    const myProjectsQuery = query(collection(db, "projects"), where("owner", "==", user.uid));
    onSnapshot(myProjectsQuery, (snapshot) => {
        const list = document.getElementById("my-projects-list");
        list.innerHTML = "";
        if (snapshot.empty) {
            list.innerHTML = '<div class="project-card">No projects found. Create one!</div>';
        } else {
            snapshot.forEach(doc => {
                const data = doc.data();
                const card = createProjectCard(doc.id, data.name || "Untitled Project");
                list.appendChild(card);
            });
        }
    });

    // Load Shared Projects (where I am a collaborator but NOT the owner)
    // Note: In a simple setup, we check if user.uid is in collaborators array
    const sharedProjectsQuery = query(collection(db, "projects"), where("collaborators", "array-contains", user.uid));
    onSnapshot(sharedProjectsQuery, (snapshot) => {
        const list = document.getElementById("shared-projects-list");
        list.innerHTML = "";
        let count = 0;
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.owner !== user.uid) {
                const card = createProjectCard(doc.id, data.name || "Shared Project");
                list.appendChild(card);
                count++;
            }
        });
        if (count === 0) {
            list.innerHTML = '<div class="project-card">No shared projects.</div>';
        }
    });

    // Button Handlers
    document.getElementById("new-project-btn").onclick = async () => {
        const projectName = prompt("Enter project name:", "New Project");
        if (!projectName) return;

        const docRef = await addDoc(collection(db, "projects"), {
            name: projectName,
            owner: user.uid,
            collaborators: [user.uid],
            createdAt: new Date()
        });
        window.location.href = `project.html?id=${docRef.id}`;
    };

    document.getElementById("logout-btn").onclick = () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    };
});

function createProjectCard(id, name) {
    const div = document.createElement("div");
    div.className = "project-card";
    div.textContent = name;
    div.onclick = () => {
        window.location.href = `project.html?id=${id}`;
    };
    return div;
}
</script>

</body>
</html>
