<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar">
        <button id="new-project-btn">+ New Project</button>
        <button id="logout-btn">Logout</button>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <h2 id="welcome-text">Loading...</h2>
        </div>
        
        <div class="projects-section">
            <h3>My Projects</h3>
            <div id="my-projects-list">
                <div class="project-card">Loading projects...</div>
            </div>
        </div>

        <div class="projects-section">
            <h3>Shared with Me</h3>
            <div id="shared-projects-list">
                <div class="project-card">Loading shared projects...</div>
            </div>
        </div>
    </div>

</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    doc,
    updateDoc,
    deleteDoc,
    query, 
    where, 
    onSnapshot,
    arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔑 WAIT FOR AUTH
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById("welcome-text").textContent = "WELCOME, " + user.email;

    // Load My Projects
    const myProjectsQuery = query(collection(db, "projects"), where("owner", "==", user.uid));
    onSnapshot(myProjectsQuery, (snapshot) => {
        const list = document.getElementById("my-projects-list");
        list.innerHTML = "";
        if (snapshot.empty) {
            list.innerHTML = '<div class="project-card">No projects found. Create one!</div>';
        } else {
            snapshot.forEach(pDoc => {
                const data = pDoc.data();
                const card = createProjectCard(pDoc.id, data.name || "Untitled Project", true, user.uid);
                list.appendChild(card);
            });
        }
    });

    // Load Shared Projects
    const sharedProjectsQuery = query(collection(db, "projects"), where("collaborators", "array-contains", user.uid));
    onSnapshot(sharedProjectsQuery, (snapshot) => {
        const list = document.getElementById("shared-projects-list");
        list.innerHTML = "";
        let count = 0;
        snapshot.forEach(pDoc => {
            const data = pDoc.data();
            if (data.owner !== user.uid) {
                const card = createProjectCard(pDoc.id, data.name || "Shared Project", false, user.uid);
                list.appendChild(card);
                count++;
            }
        });
        if (count === 0) {
            list.innerHTML = '<div class="project-card">No shared projects.</div>';
        }
    });

    // Button Handlers
    document.getElementById("new-project-btn").onclick = async () => {
        const projectName = prompt("Enter project name:", "New Project");
        if (!projectName) return;

        const docRef = await addDoc(collection(db, "projects"), {
            name: projectName,
            owner: user.uid,
            collaborators: [user.uid],
            createdAt: new Date()
        });
        window.location.href = `project.html?id=${docRef.id}`;
    };

    document.getElementById("logout-btn").onclick = () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    };
});

function createProjectCard(id, name, isOwner, userId) {
    const div = document.createElement("div");
    div.className = "project-card";
    
    const nameSpan = document.createElement("span");
    nameSpan.textContent = name;
    div.appendChild(nameSpan);

    const actions = document.createElement("div");
    actions.className = "project-actions";

    if (isOwner) {
        const renameBtn = document.createElement("button");
        renameBtn.textContent = "Rename";
        renameBtn.onclick = async (e) => {
            e.stopPropagation();
            const newName = prompt("New project name:", name);
            if (newName && newName !== name) {
                await updateDoc(doc(db, "projects", id), { name: newName });
            }
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.style.borderColor = "#ff0033";
        deleteBtn.style.color = "#ff0033";
        deleteBtn.onclick = async (e) => {
            e.stopPropagation();
            if (confirm("Delete this project? This cannot be undone.")) {
                await deleteDoc(doc(db, "projects", id));
            }
        };

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);
    } else {
        const leaveBtn = document.createElement("button");
        leaveBtn.textContent = "Leave";
        leaveBtn.style.borderColor = "#ff9900";
        leaveBtn.style.color = "#ff9900";
        leaveBtn.onclick = async (e) => {
            e.stopPropagation();
            if (confirm("Leave this project?")) {
                await updateDoc(doc(db, "projects", id), {
                    collaborators: arrayRemove(userId)
                });
            }
        };
        actions.appendChild(leaveBtn);
    }

    div.appendChild(actions);

    div.onclick = () => {
        window.location.href = `project.html?id=${id}`;
    };
    
    return div;
}
</script>

</body>
</html>
