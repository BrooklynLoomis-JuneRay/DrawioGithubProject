<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Project</title>

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/project.css">
</head>
<body>

<div class="toolbar">
    <button id="back-btn">Back</button>
    <button id="add-square">Square</button>
    <button id="add-circle">Circle</button>
    <button id="collaborate-btn">Collaborate</button>
</div>

<div id="canvas" class="canvas"></div>

<!-- Edit Sidebar -->
<div id="edit-sidebar" class="edit-sidebar">
    <h3>Edit Object</h3>
    <div class="edit-group">
        <label>X Position</label>
        <input type="number" id="edit-x">
    </div>
    <div class="edit-group">
        <label>Y Position</label>
        <input type="number" id="edit-y">
    </div>
    <div class="edit-group">
        <label>Width</label>
        <input type="number" id="edit-width">
    </div>
    <div class="edit-group">
        <label>Height</label>
        <input type="number" id="edit-height">
    </div>
    <button id="delete-object-btn" style="margin-top: 10px; border-color: #ff0033; color: #ff0033;">Delete Object</button>
    <button id="close-sidebar-btn" style="margin-top: auto;">Close</button>
</div>

<!-- Collaborate Modal -->
<div id="collaborate-modal" class="modal">
    <div class="modal-content">
        <h3>Add Collaborator</h3>
        <input type="text" id="user-search" class="user-search-input" placeholder="Search by email...">
        <div id="user-list" class="user-list"></div>
        <button id="close-modal-btn" style="margin-top: 10px;">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc,
    setDoc,
    doc,
    getDoc,
    updateDoc,
    deleteDoc,
    onSnapshot,
    getDocs,
    query,
    where,
    arrayUnion,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔑 Get project ID from URL
const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

if (!projectId) {
    window.location.href = "dashboard.html";
}

let selectedElementId = null;
let currentUser = null;

// Helper to get coordinates for both Mouse and Touch
function getCoords(e) {
    if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].pageX, y: e.touches[0].pageY };
    }
    return { x: e.pageX, y: e.pageY };
}

// Protect page
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        currentUser = user;
        initPresence();
    }
});

// Reference elements
const elementsRef = collection(db, "projects", projectId, "elements");

let lastElementUpdateTime = 0;
let lastCursorUpdateTime = 0;
const UPDATE_INTERVAL = 100; // ms
    
// Real-time listener for elements
onSnapshot(elementsRef, (snapshot) => {
    snapshot.docChanges().forEach(change => {
        if (change.type === "added") {
            createElement(change.doc.id, change.doc.data());
        }
        if (change.type === "modified") {
            updateElementOnScreen(change.doc.id, change.doc.data());
            if (selectedElementId === change.doc.id) {
                updateSidebarInputs(change.doc.data());
            }
        }
        if (change.type === "removed") {
            const el = document.querySelector(`[data-id="${change.doc.id}"]`);
            if (el) el.remove();
            if (selectedElementId === change.doc.id) {
                closeSidebar();
            }
        }
    });
});

function createElement(id, data) {
    if (document.querySelector(`[data-id="${id}"]`)) return;

    const el = document.createElement("div");
    el.classList.add("canvas-element");
    el.dataset.id = id;

    el.style.left = data.x + "px";
    el.style.top = data.y + "px";
    el.style.width = data.width + "px";
    el.style.height = data.height + "px";

    if (data.type === "circle") {
        el.style.borderRadius = "50%";
    }

    document.getElementById("canvas").appendChild(el);

    makeDraggable(el, id);
    makeResizable(el, id);
    
    const clickHandler = (e) => {
        e.stopPropagation();
        openSidebar(id, data);
    };
    el.addEventListener("click", clickHandler);

    el.isDragging = false;
}

function updateElementOnScreen(id, data) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (!el || el.isDragging) return;

    el.style.left = data.x + "px";
    el.style.top = data.y + "px";
    el.style.width = data.width + "px";
    el.style.height = data.height + "px";
}

function makeDraggable(el, id) {
    let offsetX, offsetY;

    const start = (e) => {
        if (e.target.classList.contains("resize-handle")) return;
        
        el.isDragging = true;
        const coords = getCoords(e);
        const rect = el.getBoundingClientRect();
        offsetX = coords.x - rect.left;
        offsetY = coords.y - rect.top;

        const move = (e) => {
            const coords = getCoords(e);
            const x = coords.x - offsetX;
            const y = coords.y - offsetY;

            el.style.left = x + "px";
            el.style.top = y + "px";

            const now = Date.now();
            if (now - lastElementUpdateTime > UPDATE_INTERVAL) {
                lastElementUpdateTime = now;
                updateElementLive(id, x, y);
            }
        };

        const stop = () => {
            document.removeEventListener("mousemove", move);
            document.removeEventListener("mouseup", stop);
            document.removeEventListener("touchmove", move);
            document.removeEventListener("touchend", stop);
            el.isDragging = false;
            updateElementFinal(id, el);
        };

        document.addEventListener("mousemove", move);
        document.addEventListener("mouseup", stop);
        document.addEventListener("touchmove", move, { passive: false });
        document.addEventListener("touchend", stop);
    };

    el.addEventListener("mousedown", start);
    el.addEventListener("touchstart", start, { passive: false });
}

async function updateElementLive(id, x, y) {
    const ref = doc(db, "projects", projectId, "elements", id);
    await updateDoc(ref, { x, y });
}

async function updateElementFinal(id, el) {
    const ref = doc(db, "projects", projectId, "elements", id);
    await updateDoc(ref, {
        x: parseInt(el.style.left),
        y: parseInt(el.style.top),
        width: el.offsetWidth,
        height: el.offsetHeight
    });
}

function makeResizable(el, id) {
    const positions = ["top-left", "top-right", "bottom-left", "bottom-right"];
    positions.forEach(pos => {
        const handle = document.createElement("div");
        handle.classList.add("resize-handle", pos);
        el.appendChild(handle);

        const start = (e) => {
            e.stopPropagation();
            const startCoords = getCoords(e);
            let startX = startCoords.x;
            let startY = startCoords.y;
            let startWidth = el.offsetWidth;
            let startHeight = el.offsetHeight;
            let startLeft = el.offsetLeft;
            let startTop = el.offsetTop;

            const resize = (e) => {
                const coords = getCoords(e);
                let dx = coords.x - startX;
                let dy = coords.y - startY;

                if (pos.includes("right")) el.style.width = startWidth + dx + "px";
                if (pos.includes("left")) {
                    el.style.width = startWidth - dx + "px";
                    el.style.left = startLeft + dx + "px";
                }
                if (pos.includes("bottom")) el.style.height = startHeight + dy + "px";
                if (pos.includes("top")) {
                    el.style.height = startHeight - dy + "px";
                    el.style.top = startTop + dy + "px";
                }
            };

            const stop = () => {
                document.removeEventListener("mousemove", resize);
                document.removeEventListener("mouseup", stop);
                document.removeEventListener("touchmove", resize);
                document.removeEventListener("touchend", stop);
                updateElementFinal(id, el);
            };

            document.addEventListener("mousemove", resize);
            document.addEventListener("mouseup", stop);
            document.addEventListener("touchmove", resize, { passive: false });
            document.addEventListener("touchend", stop);
        };

        handle.addEventListener("mousedown", start);
        handle.addEventListener("touchstart", start, { passive: false });
    });
}

// Sidebar Logic
const sidebar = document.getElementById("edit-sidebar");
const editX = document.getElementById("edit-x");
const editY = document.getElementById("edit-y");
const editWidth = document.getElementById("edit-width");
const editHeight = document.getElementById("edit-height");

function openSidebar(id, data) {
    selectedElementId = id;
    sidebar.classList.add("open");
    updateSidebarInputs(data);
}

function updateSidebarInputs(data) {
    editX.value = data.x;
    editY.value = data.y;
    editWidth.value = data.width;
    editHeight.value = data.height;
}

function closeSidebar() {
    selectedElementId = null;
    sidebar.classList.remove("open");
}

document.getElementById("close-sidebar-btn").onclick = closeSidebar;

[editX, editY, editWidth, editHeight].forEach(input => {
    input.onchange = async () => {
        if (!selectedElementId) return;
        const ref = doc(db, "projects", projectId, "elements", selectedElementId);
        await updateDoc(ref, {
            x: parseInt(editX.value),
            y: parseInt(editY.value),
            width: parseInt(editWidth.value),
            height: parseInt(editHeight.value)
        });
    };
});

document.getElementById("delete-object-btn").onclick = async () => {
    if (!selectedElementId) return;
    if (confirm("Delete this object?")) {
        const ref = doc(db, "projects", projectId, "elements", selectedElementId);
        await deleteDoc(ref);
        closeSidebar();
    }
};

document.getElementById("canvas").addEventListener("click", () => {
    closeSidebar();
});

// --- REAL-TIME PRESENCE (CURSORS) ---

const presenceRef = collection(db, "projects", projectId, "presence");

function initPresence() {
    const updateMyPosition = (e) => {
        if (!currentUser) return;
        
        const now = Date.now();
        if (now - lastCursorUpdateTime > 100) { 
            lastCursorUpdateTime = now;
            const coords = getCoords(e);
            const cursorRef = doc(presenceRef, currentUser.uid);
            setDoc(cursorRef, {
                x: coords.x,
                y: coords.y,
                email: currentUser.email,
                lastSeen: serverTimestamp()
            }, { merge: true }).catch(err => console.error("Presence error:", err));
        }
    };

    document.addEventListener("mousemove", updateMyPosition);
    document.addEventListener("touchmove", updateMyPosition, { passive: true });

    onSnapshot(presenceRef, (snapshot) => {
        snapshot.docChanges().forEach(change => {
            const id = change.doc.id;
            if (currentUser && id === currentUser.uid) return;

            if (change.type === "added" || change.type === "modified") {
                updateRemoteCursor(id, change.doc.data());
            }
            if (change.type === "removed") {
                const el = document.getElementById(`cursor-${id}`);
                if (el) el.remove();
            }
        });
    });

    window.addEventListener("beforeunload", () => {
        if (currentUser) {
            deleteDoc(doc(presenceRef, currentUser.uid));
        }
    });
}

function updateRemoteCursor(id, data) {
    let el = document.getElementById(`cursor-${id}`);
    if (!el) {
        el = document.createElement("div");
        el.id = `cursor-${id}`;
        el.className = "remote-cursor";
        el.innerHTML = `
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M7,2l12,11.2l-5.8,0.5l3.3,7.3l-2.2,1l-3.2-7.4L7,19V2z"/>
            </svg>
            <div class="cursor-label">${data.email.split('@')[0]}</div>
        `;
        document.body.appendChild(el);
    }
    el.style.transform = `translate(${data.x}px, ${data.y}px)`;
}

// --- END PRESENCE ---

// Toolbar actions
document.getElementById("add-square").onclick = () => {
    addDoc(elementsRef, { type: "square", x: 50, y: 50, width: 50, height: 50 });
};

document.getElementById("add-circle").onclick = () => {
    addDoc(elementsRef, { type: "circle", x: 100, y: 100, width: 50, height: 50 });
};

document.getElementById("back-btn").onclick = () => {
    window.location.href = "dashboard.html";
};

// Collaborate Modal Logic
const modal = document.getElementById("collaborate-modal");
const collBtn = document.getElementById("collaborate-btn");
const closeBtn = document.getElementById("close-modal-btn");
const userSearch = document.getElementById("user-search");
const userList = document.getElementById("user-list");

collBtn.onclick = () => {
    modal.style.display = "block";
    loadUsers("");
};

closeBtn.onclick = () => {
    modal.style.display = "none";
};

userSearch.oninput = (e) => {
    loadUsers(e.target.value);
};

async function loadUsers(searchText) {
    userList.innerHTML = "Searching...";
    const projectSnap = await getDoc(doc(db, "projects", projectId));
    const collaborators = projectSnap.data().collaborators || [];

    const usersQuery = query(collection(db, "users"));
    const snapshot = await getDocs(usersQuery);
    
    userList.innerHTML = "";
    snapshot.forEach(uDoc => {
        const userData = uDoc.data();
        if (userData.email.toLowerCase().includes(searchText.toLowerCase())) {
            const isCollaborator = collaborators.includes(uDoc.id);
            const div = document.createElement("div");
            div.className = "user-item";
            div.innerHTML = `
                <span>${userData.email}</span>
                <button data-uid="${uDoc.id}" ${isCollaborator ? 'disabled class="added"' : ''}>
                    ${isCollaborator ? 'Added' : 'Add'}
                </button>
            `;
            const btn = div.querySelector("button");
            if (!isCollaborator) {
                btn.onclick = async () => {
                    await addCollaborator(uDoc.id, userData.email, btn);
                };
            }
            userList.appendChild(div);
        }
    });
}

async function addCollaborator(userId, userEmail, btn) {
    const projectRef = doc(db, "projects", projectId);
    await updateDoc(projectRef, {
        collaborators: arrayUnion(userId)
    });
    btn.textContent = "Added";
    btn.disabled = true;
    btn.classList.add("added");
}

window.onclick = (event) => {
    if (event.target == modal) {
        modal.style.display = "none";
    }
};

</script>

</body>
</html>
