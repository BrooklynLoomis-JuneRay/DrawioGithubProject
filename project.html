<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Project</title>

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/project.css">
</head>
<body>

<div class="toolbar">
    <button id="back-btn">Back</button>
    
    <div class="dropdown">
        <button id="add-shape-btn">Add Shape ▼</button>
        <div class="dropdown-content">
            <button id="add-square">Square</button>
            <button id="add-circle">Circle</button>
            <button id="add-triangle">Triangle</button>
            <button id="add-star">Star</button>
        </div>
    </div>

    <button id="add-text">Text</button>
    <button id="collaborate-btn">Collaborate</button>

    <div class="status-indicator">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Online</span>
    </div>
</div>

<div id="canvas" class="canvas"></div>

<div id="toast-container"></div>

<!-- Edit Sidebar -->
<div id="edit-sidebar" class="edit-sidebar">
    <h3>Edit Object</h3>
    
    <div class="edit-group">
        <label>Position & Size</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <input type="number" id="edit-x" placeholder="X">
            <input type="number" id="edit-y" placeholder="Y">
            <input type="number" id="edit-width" placeholder="W">
            <input type="number" id="edit-height" placeholder="H">
        </div>
    </div>

    <div class="edit-group">
        <label>Rotation (deg)</label>
        <input type="number" id="edit-rotation">
    </div>

    <div class="edit-group">
        <label>Colors</label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="flex: 1;">
                <label style="font-size: 10px;">Fill</label>
                <input type="color" id="edit-fill-color" style="width: 100%;">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 10px;">Border</label>
                <input type="color" id="edit-border-color" style="width: 100%;">
            </div>
        </div>
    </div>

    <div class="edit-group" id="border-toggle-group">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="edit-show-border" checked>
            Show Border
        </label>
    </div>

    <div class="edit-group">
        <label>Opacity</label>
        <input type="range" id="edit-opacity" min="0" max="1" step="0.01" style="width: 100%;">
    </div>

    <div class="edit-group" id="edit-text-group" style="display: none;">
        <label>Text Content</label>
        <textarea id="edit-text-content" rows="4" style="background: transparent; border: 1px solid #00ff99; color: #00ff99; padding: 5px; outline: none; resize: vertical;"></textarea>
    </div>

    <button id="delete-object-btn" style="margin-top: 10px; border-color: #ff0033; color: #ff0033;">Delete Object</button>
    <button id="close-sidebar-btn" style="margin-top: auto;">Close</button>
</div>

<!-- Collaborate Modal -->
<div id="collaborate-modal" class="modal">
    <div class="modal-content">
        <h3>Add Collaborator</h3>
        <input type="text" id="user-search" class="user-search-input" placeholder="Search by email...">
        <div id="user-list" class="user-list"></div>
        <button id="close-modal-btn" style="margin-top: 10px;">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
    getFirestore, collection, addDoc, setDoc, doc, getDoc, updateDoc, deleteDoc, 
    onSnapshot, getDocs, query, where, arrayUnion, serverTimestamp, enableIndexedDbPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM",
    databaseURL: "https://github-project-data-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const rtdb = getDatabase(app);

enableIndexedDbPersistence(db).catch(() => {});

const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");
if (!projectId) window.location.href = "dashboard.html";

let selectedElementId = null;
let currentUser = null;
let allElements = {}; // Global cache for element data

function showToast(message, isError = false) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = `toast ${isError ? 'error' : ''}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

const connectedRef = ref(rtdb, ".info/connected");
onValue(connectedRef, (snap) => {
    const dot = document.getElementById("status-dot");
    const text = document.getElementById("status-text");
    if (snap.val() === true) { dot.classList.remove("offline"); text.textContent = "Online"; } 
    else { dot.classList.add("offline"); text.textContent = "Reconnecting..."; }
});

function getCoords(e) {
    if (e.touches && e.touches.length > 0) return { x: e.touches[0].pageX, y: e.touches[0].pageY };
    return { x: e.pageX, y: e.pageY };
}

onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "index.html";
    else { currentUser = user; initPresence(); }
});

const elementsRef = collection(db, "projects", projectId, "elements");
let lastElementUpdateTime = 0;
let lastCursorUpdateTime = 0;
const UPDATE_INTERVAL = 100;

onSnapshot(elementsRef, (snapshot) => {
    snapshot.docChanges().forEach(change => {
        const id = change.doc.id;
        const data = change.doc.data();
        allElements[id] = data; // Update cache

        if (change.type === "added") createElement(id, data);
        if (change.type === "modified") {
            updateElementOnScreen(id, data);
            if (selectedElementId === id) updateSidebarInputs(data);
        }
        if (change.type === "removed") {
            document.querySelector(`[data-id="${id}"]`)?.remove();
            delete allElements[id];
            if (selectedElementId === id) closeSidebar();
        }
    });
});

function createElement(id, data) {
    if (document.querySelector(`[data-id="${id}"]`)) return;
    const el = document.createElement("div");
    el.classList.add("canvas-element");
    el.dataset.id = id;

    if (data.type === "text") {
        const textDiv = document.createElement("div");
        textDiv.className = "text-content";
        textDiv.innerText = data.text || "";
        el.appendChild(textDiv);
    } else if (data.type === "triangle" || data.type === "star") {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 100 100");
        svg.classList.add("shape-svg");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        if (data.type === "triangle") path.setAttribute("d", "M50 5 L95 95 L5 95 Z");
        else path.setAttribute("d", "M50 0 L63 38 L100 38 L70 61 L82 100 L50 75 L18 100 L30 61 L0 38 L37 38 Z");
        path.setAttribute("stroke-width", "2");
        svg.appendChild(path);
        el.appendChild(svg);
    }

    applyElementStyles(el, data);
    document.getElementById("canvas").appendChild(el);
    makeDraggable(el, id);
    makeResizable(el, id);
    makeRotatable(el, id);
    el.addEventListener("click", (e) => { e.stopPropagation(); openSidebar(id); });
}

function applyElementStyles(el, data) {
    el.style.left = data.x + "px";
    el.style.top = data.y + "px";
    el.style.width = data.width + "px";
    el.style.height = data.height + "px";
    el.style.transform = `rotate(${data.rotation || 0}deg)`;
    el.style.opacity = data.opacity ?? 1;
    if (data.type === "circle") el.style.borderRadius = "50%";
    const fill = data.fillColor || "transparent";
    const border = data.borderColor || "#00ff99";
    if (data.type === "triangle" || data.type === "star") {
        const path = el.querySelector("path");
        if (path) {
            path.setAttribute("fill", fill);
            path.setAttribute("stroke", data.showBorder !== false ? border : "transparent");
        }
        el.style.border = "none";
        el.style.backgroundColor = "transparent";
    } else {
        el.style.backgroundColor = fill;
        el.style.borderColor = data.showBorder !== false ? border : "transparent";
        el.style.color = border; 
    }
}

async function updateElementProperty(id, properties) {
    if (!id) return;
    try { await updateDoc(doc(db, "projects", projectId, "elements", id), properties); } 
    catch (err) { console.error("Sync error:", err); }
}

function updateElementOnScreen(id, data) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (!el || el.isDragging || el.isRotating || el.isResizing) return;
    applyElementStyles(el, data);
    if (data.type === "text") {
        const td = el.querySelector(".text-content");
        if (td) td.innerText = data.text || "";
    }
}

function makeDraggable(el, id) {
    let offsetX, offsetY;
    const start = (e) => {
        if (e.target.classList.contains("resize-handle") || e.target.classList.contains("rotate-handle")) return;
        el.isDragging = true;
        const coords = getCoords(e);
        offsetX = coords.x - el.offsetLeft;
        offsetY = coords.y - el.offsetTop;
        const move = (e) => {
            const coords = getCoords(e);
            el.style.left = (coords.x - offsetX) + "px";
            el.style.top = (coords.y - offsetY) + "px";
            if (Date.now() - lastElementUpdateTime > UPDATE_INTERVAL) {
                lastElementUpdateTime = Date.now();
                updateElementProperty(id, { x: coords.x - offsetX, y: coords.y - offsetY });
            }
        };
        const stop = () => {
            document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", stop);
            document.removeEventListener("touchmove", move); document.removeEventListener("touchend", stop);
            el.isDragging = false;
            updateElementProperty(id, { x: el.offsetLeft, y: el.offsetTop });
        };
        document.addEventListener("mousemove", move); document.addEventListener("mouseup", stop);
        document.addEventListener("touchmove", move, { passive: false }); document.addEventListener("touchend", stop);
    };
    el.addEventListener("mousedown", start); el.addEventListener("touchstart", start, { passive: false });
}

function makeResizable(el, id) {
    const positions = ["top-left", "top-right", "bottom-left", "bottom-right"];
    positions.forEach(pos => {
        const handle = document.createElement("div");
        handle.classList.add("resize-handle", pos);
        el.appendChild(handle);
        const start = (e) => {
            e.stopPropagation();
            el.isResizing = true;
            const sc = getCoords(e);
            let sw = el.offsetWidth, sh = el.offsetHeight, sx = sc.x, sy = sc.y, sl = el.offsetLeft, st = el.offsetTop;
            const resize = (e) => {
                const c = getCoords(e);
                let dx = c.x - sx, dy = c.y - sy;
                let up = {};
                if (pos.includes("right")) { el.style.width = (sw + dx) + "px"; up.width = sw + dx; }
                if (pos.includes("left")) { el.style.width = (sw - dx) + "px"; el.style.left = (sl + dx) + "px"; up.width = sw - dx; up.x = sl + dx; }
                if (pos.includes("bottom")) { el.style.height = (sh + dy) + "px"; up.height = sh + dy; }
                if (pos.includes("top")) { el.style.height = (sh - dy) + "px"; el.style.top = (st + dy) + "px"; up.height = sh - dy; up.y = st + dy; }
                if (Date.now() - lastElementUpdateTime > UPDATE_INTERVAL) {
                    lastElementUpdateTime = Date.now(); updateElementProperty(id, up);
                }
            };
            const stop = () => {
                document.removeEventListener("mousemove", resize); document.removeEventListener("mouseup", stop);
                document.removeEventListener("touchmove", resize); document.removeEventListener("touchend", stop);
                el.isResizing = false;
                updateElementProperty(id, { width: el.offsetWidth, height: el.offsetHeight, x: el.offsetLeft, y: el.offsetTop });
            };
            document.addEventListener("mousemove", resize); document.addEventListener("mouseup", stop);
            document.addEventListener("touchmove", resize, { passive: false }); document.addEventListener("touchend", stop);
        };
        handle.addEventListener("mousedown", start); handle.addEventListener("touchstart", start, { passive: false });
    });
}

function makeRotatable(el, id) {
    const handle = document.createElement("div");
    handle.classList.add("rotate-handle");
    el.appendChild(handle);
    const start = (e) => {
        e.stopPropagation();
        el.isRotating = true;
        const r = el.getBoundingClientRect(), cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const rotate = (e) => {
            const c = getCoords(e);
            const deg = Math.atan2(c.y - cy, c.x - cx) * (180 / Math.PI) + 90;
            el.style.transform = `rotate(${deg}deg)`;
            if (Date.now() - lastElementUpdateTime > UPDATE_INTERVAL) {
                lastElementUpdateTime = Date.now(); updateElementProperty(id, { rotation: deg });
            }
        };
        const stop = () => {
            document.removeEventListener("mousemove", rotate); document.removeEventListener("mouseup", stop);
            document.removeEventListener("touchmove", rotate); document.removeEventListener("touchend", stop);
            el.isRotating = false;
        };
        document.addEventListener("mousemove", rotate); document.addEventListener("mouseup", stop);
        document.addEventListener("touchmove", rotate, { passive: false }); document.addEventListener("touchend", stop);
    };
    handle.addEventListener("mousedown", start); handle.addEventListener("touchstart", start, { passive: false });
}

const sidebar = document.getElementById("edit-sidebar");
const editX = document.getElementById("edit-x"), editY = document.getElementById("edit-y");
const editW = document.getElementById("edit-width"), editH = document.getElementById("edit-height");
const editRot = document.getElementById("edit-rotation");
const editFC = document.getElementById("edit-fill-color"), editBC = document.getElementById("edit-border-color");
const editSB = document.getElementById("edit-show-border"), editOP = document.getElementById("edit-opacity");
const editTG = document.getElementById("edit-text-group"), editTC = document.getElementById("edit-text-content");

function openSidebar(id) {
    selectedElementId = id;
    const data = allElements[id];
    if (data) {
        sidebar.classList.add("open");
        updateSidebarInputs(data);
    }
}

function updateSidebarInputs(data) {
    editX.value = Math.round(data.x); editY.value = Math.round(data.y);
    editW.value = Math.round(data.width); editH.value = Math.round(data.height);
    editRot.value = Math.round(data.rotation || 0);
    editFC.value = data.fillColor || "#000000"; 
    editBC.value = data.borderColor || "#00ff99";
    editSB.checked = data.showBorder !== false;
    editOP.value = data.opacity ?? 1;
    editTG.style.display = data.type === "text" ? "block" : "none";
    editTC.value = data.text || "";
}

function closeSidebar() { selectedElementId = null; sidebar.classList.remove("open"); }
document.getElementById("close-sidebar-btn").onclick = closeSidebar;

[editX, editY, editW, editH, editRot, editFC, editBC, editSB, editOP, editTC].forEach(input => {
    const eventType = (input.type === "checkbox") ? "change" : "input";
    input.addEventListener(eventType, () => {
        if (!selectedElementId) return;
        updateElementProperty(selectedElementId, {
            x: parseInt(editX.value) || 0, y: parseInt(editY.value) || 0,
            width: parseInt(editW.value) || 1, height: parseInt(editH.value) || 1,
            rotation: parseFloat(editRot.value) || 0, fillColor: editFC.value,
            borderColor: editBC.value, showBorder: editSB.checked,
            opacity: parseFloat(editOP.value), text: editTC.value
        });
    });
});

document.getElementById("delete-object-btn").onclick = async () => {
    if (selectedElementId && confirm("Delete object?")) {
        await deleteDoc(doc(db, "projects", projectId, "elements", selectedElementId)); closeSidebar();
    }
};
document.getElementById("canvas").addEventListener("click", (e) => { if (e.target.id === "canvas") closeSidebar(); });

const presenceRef = collection(db, "projects", projectId, "presence");
function initPresence() {
    document.addEventListener("mousemove", (e) => {
        if (!currentUser || Date.now() - lastCursorUpdateTime < 100) return;
        lastCursorUpdateTime = Date.now(); const c = getCoords(e);
        setDoc(doc(presenceRef, currentUser.uid), { x: c.x, y: c.y, email: currentUser.email, lastSeen: serverTimestamp() }, { merge: true });
    });
    onSnapshot(presenceRef, (s) => {
        s.docChanges().forEach(ch => {
            const id = ch.doc.id; if (currentUser && id === currentUser.uid) return;
            if (ch.type === "added" || ch.type === "modified") {
                let el = document.getElementById(`cursor-${id}`);
                if (!el) {
                    el = document.createElement("div"); el.id = `cursor-${id}`; el.className = "remote-cursor";
                    el.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M7,2l12,11.2l-5.8,0.5l3.3,7.3l-2.2,1l-3.2-7.4L7,19V2z"/></svg><div class="cursor-label">${ch.doc.data().email.split('@')[0]}</div>`;
                    document.body.appendChild(el);
                }
                el.style.transform = `translate(${ch.doc.data().x}px, ${ch.doc.data().y}px)`;
            }
            if (ch.type === "removed") document.getElementById(`cursor-${id}`)?.remove();
        });
    });
}

const addS = (type) => addDoc(elementsRef, { type, x: 100, y: 100, width: 100, height: 100, rotation: 0, fillColor: "transparent", borderColor: "#00ff99", showBorder: true, opacity: 1 });
document.getElementById("add-square").onclick = () => addS("square");
document.getElementById("add-circle").onclick = () => addS("circle");
document.getElementById("add-triangle").onclick = () => addS("triangle");
document.getElementById("add-star").onclick = () => addS("star");
document.getElementById("add-text").onclick = () => addDoc(elementsRef, { type: "text", x: 150, y: 150, width: 150, height: 50, rotation: 0, text: "New Text", fillColor: "transparent", borderColor: "#00ff99", showBorder: true, opacity: 1 });
document.getElementById("back-btn").onclick = () => window.location.href = "dashboard.html";

const modal = document.getElementById("collaborate-modal");
document.getElementById("collaborate-btn").onclick = () => { modal.style.display = "block"; loadUsers(""); };
document.getElementById("close-modal-btn").onclick = () => modal.style.display = "none";
document.getElementById("user-search").oninput = (e) => loadUsers(e.target.value);
async function loadUsers(st) {
    const ps = await getDoc(doc(db, "projects", projectId)), colls = ps.data().collaborators || [];
    const s = await getDocs(collection(db, "users")), list = document.getElementById("user-list");
    list.innerHTML = "";
    s.forEach(u => {
        if (u.data().email.toLowerCase().includes(st.toLowerCase())) {
            const isC = colls.includes(u.id), div = document.createElement("div");
            div.className = "user-item"; div.innerHTML = `<span>${u.data().email}</span><button ${isC ? 'disabled class="added"' : ''}>${isC ? 'Added' : 'Add'}</button>`;
            if (!isC) div.querySelector("button").onclick = async () => { await updateDoc(doc(db, "projects", projectId), { collaborators: arrayUnion(u.id) }); loadUsers(st); };
            list.appendChild(div);
        }
    });
}
window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; };
</script>
</body>
</html>
