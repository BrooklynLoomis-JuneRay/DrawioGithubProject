<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff99;
}

.toolbar {
    padding: 10px;
    border-bottom: 1px solid #00ff99;
}

.canvas {
    position: relative;
    height: calc(100vh - 50px);
}

.shape {
    position: absolute;
    border: 1px solid #00ff99;
}

.circle {
    border-radius: 50%;
}
</style>
</head>
<body>

<div class="toolbar">
    <button id="add-square">Square</button>
    <button id="add-circle">Circle</button>
</div>

<div id="canvas" class="canvas"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc,
    onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔑 Get project ID from URL
const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

// Protect page
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    }
});

// Reference elements
const elementsRef = collection(db, "projects", projectId, "elements");

// Real-time listener
onSnapshot(elementsRef, (snapshot) => {
    const canvas = document.getElementById("canvas");
    canvas.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        // 🔥 attach the Firestore ID
        data.id = doc.id;

        createElement(data); // ✅ use the interactive version
    });
});
function createElement(data) {
    const el = document.createElement("div");

    el.classList.add("canvas-element");
    el.dataset.id = data.id;

    el.style.left = data.x + "px";
    el.style.top = data.y + "px";
    el.style.width = data.width + "px";
    el.style.height = data.height + "px";

    if (data.type === "circle") {
        el.style.borderRadius = "50%";
    }

    document.getElementById("canvas").appendChild(el);

    makeDraggable(el, data.id);
    makeResizable(el, data.id);
}

function makeDraggable(el, id) {
    let offsetX, offsetY;

    el.addEventListener("mousedown", (e) => {
        // ❗ Prevent dragging when resizing
        if (e.target.classList.contains("resize-handle")) return;

        offsetX = e.offsetX;
        offsetY = e.offsetY;

        function move(e) {
            el.style.left = (e.pageX - offsetX) + "px";
            el.style.top = (e.pageY - offsetY) + "px";
        }

        function stop() {
            document.removeEventListener("mousemove", move);
            document.removeEventListener("mouseup", stop);

            updateElement(id, el);
        }

        document.addEventListener("mousemove", move);
        document.addEventListener("mouseup", stop);
    });
}

function makeResizable(el, id) {
    const positions = ["top-left", "top-right", "bottom-left", "bottom-right"];

    positions.forEach(pos => {
        const handle = document.createElement("div");
        handle.classList.add("resize-handle", pos);
        el.appendChild(handle);

        handle.addEventListener("mousedown", (e) => {
            e.stopPropagation();

            let startX = e.pageX;
            let startY = e.pageY;

            let startWidth = el.offsetWidth;
            let startHeight = el.offsetHeight;
            let startLeft = el.offsetLeft;
            let startTop = el.offsetTop;

            function resize(e) {
                let dx = e.pageX - startX;
                let dy = e.pageY - startY;

                if (pos.includes("right")) {
                    el.style.width = startWidth + dx + "px";
                }
                if (pos.includes("left")) {
                    el.style.width = startWidth - dx + "px";
                    el.style.left = startLeft + dx + "px";
                }
                if (pos.includes("bottom")) {
                    el.style.height = startHeight + dy + "px";
                }
                if (pos.includes("top")) {
                    el.style.height = startHeight - dy + "px";
                    el.style.top = startTop + dy + "px";
                }
            }

            function stop() {
                document.removeEventListener("mousemove", resize);
                document.removeEventListener("mouseup", stop);

                updateElement(id, el);
            }

            document.addEventListener("mousemove", resize);
            document.addEventListener("mouseup", stop);
        });
    });
}

// Add square
document.getElementById("add-square").onclick = () => {
    addDoc(elementsRef, {
        type: "square",
        x: 50,
        y: 50,
        width: 50,
        height: 50
    });
};

// Add circle
document.getElementById("add-circle").onclick = () => {
    addDoc(elementsRef, {
        type: "circle",
        x: 100,
        y: 100,
        width: 50,
        height: 50
    });
};

import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function updateElement(id, el) {
    const projectId = new URLSearchParams(window.location.search).get("id");

    const ref = doc(db, "projects", projectId, "elements", id);

    await updateDoc(ref, {
        x: parseInt(el.style.left),
        y: parseInt(el.style.top),
        width: el.offsetWidth,
        height: el.offsetHeight
    });
}

</script>

</body>
</html>
