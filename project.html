<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Project</title>

<link rel="stylesheet" href="styles/styles.css">
<style>
/* Reset & Base */
body { margin: 0; overflow: hidden; background: #000; color: #00ff99; font-family: sans-serif; }
.toolbar { padding: 10px; border-bottom: 1px solid #00ff99; display: flex; gap: 10px; background: #000; z-index: 100; position: relative; }
.canvas { position: relative; width: 100vw; height: calc(100vh - 50px); }

/* Shapes */
.canvas-element { position: absolute; border: 2px solid #00ff99; cursor: move; }

/* Remote Cursor Styling - HIGH VISIBILITY */
.remote-cursor {
    position: absolute;
    width: 25px;
    height: 25px;
    pointer-events: none;
    z-index: 9999; /* Always on top */
    transition: transform 0.1s linear;
}
.remote-cursor svg {
    fill: #ff00ff; /* HOT PINK for maximum visibility */
    filter: drop-shadow(0 0 8px #ff00ff);
}
.cursor-label {
    position: absolute;
    top: 25px;
    left: 10px;
    background: #ff00ff;
    color: #fff;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
    border-radius: 4px;
}

/* Debug Overlay */
#debug-log {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    border: 1px solid #ff00ff;
    color: #ff00ff;
    padding: 5px;
    font-size: 10px;
    z-index: 10000;
}
</style>
</head>
<body>

<div class="toolbar">
    <button id="back-btn">Back</button>
    <button id="add-square">Add Square</button>
    <div id="status-text" style="margin-left:auto; font-size: 12px;">Connecting...</div>
</div>

<div id="canvas" class="canvas"></div>

<div id="debug-log">Debug: Initializing...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
    getFirestore, collection, addDoc, setDoc, doc, getDoc, updateDoc, deleteDoc, 
    onSnapshot, query, where, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA4vB_-McxIOWCc_8fN0GNTqGveH7LvqOk",
    authDomain: "github-project-data.firebaseapp.com",
    projectId: "github-project-data",
    storageBucket: "github-project-data.firebasestorage.app",
    messagingSenderId: "876177602744",
    appId: "1:876177602744:web:98e7f4fc0ba87369a45c4d",
    measurementId: "G-C98J8JYSZM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");
const debugEl = document.getElementById("debug-log");

let currentUser = null;

// --- 1. AUTH & USER DATA ---
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        currentUser = user;
        document.getElementById("status-text").textContent = "User: " + user.email;
        initPresence();
        initElements();
    }
});

// --- 2. ELEMENTS (SHAPES) ---
function initElements() {
    const elementsRef = collection(db, "projects", projectId, "elements");
    onSnapshot(elementsRef, (snapshot) => {
        snapshot.docChanges().forEach(change => {
            const id = change.doc.id;
            const data = change.doc.data();
            if (change.type === "added") {
                const el = document.createElement("div");
                el.className = "canvas-element";
                el.id = `obj-${id}`;
                el.style.width = "100px"; el.style.height = "100px";
                el.style.left = data.x + "px"; el.style.top = data.y + "px";
                document.getElementById("canvas").appendChild(el);
            }
            if (change.type === "modified") {
                const el = document.getElementById(`obj-${id}`);
                if (el) { el.style.left = data.x + "px"; el.style.top = data.y + "px"; }
            }
        });
    });
}

document.getElementById("add-square").onclick = () => {
    addDoc(collection(db, "projects", projectId, "elements"), { x: 50, y: 50 });
};

// --- 3. PRESENCE (THE FIX) ---
function initPresence() {
    const presenceRef = collection(db, "active_cursors");

    // A. Update my position
    document.addEventListener("mousemove", (e) => {
        if (!currentUser) return;
        setDoc(doc(presenceRef, currentUser.uid), {
            x: e.pageX,
            y: e.pageY,
            email: currentUser.email,
            projectId: projectId, // Filter by project
            lastUpdate: Date.now()
        }, { merge: true });
    });

    // B. Listen for others in this project
    const q = query(presenceRef, where("projectId", "==", projectId));
    onSnapshot(q, (snapshot) => {
        debugEl.textContent = `Debug: Found ${snapshot.size} users in project`;
        
        snapshot.docChanges().forEach(change => {
            const id = change.doc.id;
            const data = change.doc.data();

            // DO NOT SKIP SELF FOR DEBUGGING - If you see a pink cursor under your mouse, it works!
            // Later we can skip self, but for now let's see if data exists.
            
            if (change.type === "added" || change.type === "modified") {
                renderRemoteCursor(id, data);
            }
            if (change.type === "removed") {
                document.getElementById(`cursor-${id}`)?.remove();
            }
        });
    });
}

function renderRemoteCursor(id, data) {
    let el = document.getElementById(`cursor-${id}`);
    if (!el) {
        el = document.createElement("div");
        el.id = `cursor-${id}`;
        el.className = "remote-cursor";
        el.innerHTML = `
            <svg viewBox="0 0 24 24" width="25" height="25">
                <path d="M7,2l12,11.2l-5.8,0.5l3.3,7.3l-2.2,1l-3.2-7.4L7,19V2z"/>
            </svg>
            <div class="cursor-label">${data.email.split('@')[0]}</div>
        `;
        document.body.appendChild(el);
    }
    el.style.transform = `translate(${data.x}px, ${data.y}px)`;
    // Color "me" blue and "others" pink for clear testing
    if (id === currentUser.uid) {
        el.querySelector("svg").style.fill = "#00bbff";
        el.querySelector(".cursor-label").style.background = "#00bbff";
    }
}

document.getElementById("back-btn").onclick = () => window.location.href = "dashboard.html";
</script>

</body>
</html>
